
  <!DOCTYPE html>
  <html lang="en">
    <head>
      
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
      <title>tintura</title>
      <meta name="description" content="Capture and curate colors from the world around you, building a personal color diary that reflects your unique design aesthetic and visual identity." />
      <meta name="robots" content="noindex, nofollow" />
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
      
    </head>

    <body>
      
      <script>
        // Restore path after GitHub Pages 404 redirect
        (function() {
          var p = window.location.search.slice(1).split('&').find(function(s) { return s.startsWith('p='); });
          if (p) {
            var path = decodeURIComponent(p.slice(2));
            window.history.replaceState(null, null, '/' + path);
          }
        })();
      </script>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
      
    </body>
  </html>
